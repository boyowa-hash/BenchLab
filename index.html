<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenchLab — Platform Prototype</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>body { margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PAGES = ["home", "logbook", "search", "post", "consultant"];

// Subtle grain overlay as CSS
const grainCSS = `
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --forest: #2C3E2D;
  --forest-light: #3A5240;
  --gold: #C9A84C;
  --gold-soft: #D4B86A;
  --cream: #FAF6EE;
  --cream-dark: #F0EADB;
  --warm-white: #FDFCF8;
  --bark: #5C4A3A;
  --bark-light: #8B7355;
  --charcoal: #2A2A28;
  --sage: #8FA68B;
  --sage-light: #B5CBAE;
  --blush: #E8D5C4;
  --amber: #D4956B;
  --shadow: rgba(44,62,45,0.08);
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
}

.grain-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.animate-up {
  animation: fadeUp 0.6s ease-out both;
}

.animate-fade {
  animation: fadeIn 0.5s ease-out both;
}

.stagger-1 { animation-delay: 0.1s; }
.stagger-2 { animation-delay: 0.2s; }
.stagger-3 { animation-delay: 0.3s; }
.stagger-4 { animation-delay: 0.4s; }
.stagger-5 { animation-delay: 0.5s; }
.stagger-6 { animation-delay: 0.6s; }
`;

// ─── Skill tags data ───
const SKILL_TAGS = {
  processes: ["Cold-Pour Candle Production", "Hot-Pour Candle Production", "Fragrance Compounding", "Emulsion Manufacturing", "Soap Saponification (Cold Process)", "Reed Diffuser Assembly", "Filling Line Operation", "Wax Melt Production", "SPF Formulation", "Stability Testing"],
  materials: ["Soy Wax", "Coconut Wax", "Paraffin Wax", "Rapeseed Wax", "Essential Oils", "Synthetic Fragrance Oils", "Surfactants", "Emulsifiers", "Botanical Extracts", "Preservatives"],
  equipment: ["Jacketed Mixing Vessels", "Planetary Mixers", "6-Head Filling Line", "Wicking Machines", "Labelling Machines", "Homogenisers", "pH Meters", "Viscometers"],
  standards: ["GMP (ISO 22716)", "EN 15493", "EN 15426", "IFRA Standards", "EU Cosmetics Regulation", "REACH", "CLP Labelling", "ISO 9001"],
};

const VERIFICATION_LEVELS = {
  "employer": { label: "Employer Confirmed", color: "#2C3E2D", bg: "#E8F0E8" },
  "peer": { label: "Peer Verified", color: "#C9A84C", bg: "#FDF6E3" },
  "cert": { label: "Certification Backed", color: "#5C4A3A", bg: "#F0E8DC" },
  "self": { label: "Self-Declared", color: "#8B7355", bg: "#F5F0E8" },
};

// ─── Icons (inline SVGs) ───
function IconFlask({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6M10 3v6.5L4 20h16L14 9.5V3"/><path d="M7.5 16h9" opacity="0.4"/></svg>;
}
function IconSearch({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>;
}
function IconUser({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>;
}
function IconBriefcase({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>;
}
function IconCheck({ size = 16 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7"/></svg>;
}
function IconStar({ size = 16 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.27 5.82 22 7 14.14 2 9.27l6.91-1.01z"/></svg>;
}
function IconBook({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5z"/></svg>;
}
function IconCompass({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="currentColor" opacity="0.15" stroke="currentColor"/></svg>;
}
function IconHammer({ size = 20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 12l-8.5 8.5a2.12 2.12 0 01-3-3L12 9"/><path d="M17.64 15L22 10.64a1 1 0 000-1.41l-7.23-7.23a1 1 0 00-1.41 0L9 6.36"/></svg>;
}

// ─── Verification Badge ───
function VerifBadge({ level }) {
  const v = VERIFICATION_LEVELS[level];
  if (!v) return null;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600,
      color: v.color, background: v.bg, letterSpacing: 0.3,
    }}>
      <IconCheck size={12} />{v.label}
    </span>
  );
}

// ─── Nav ───
function Nav({ page, setPage }) {
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "rgba(250,246,238,0.92)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid rgba(44,62,45,0.08)",
    }}>
      <div style={{
        maxWidth: 1200, margin: "0 auto", padding: "0 24px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        height: 64,
      }}>
        <button onClick={() => setPage("home")} style={{
          background: "none", border: "none", cursor: "pointer",
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <IconFlask size={24} />
          <span style={{
            fontFamily: "'Playfair Display', serif", fontSize: 22,
            fontWeight: 700, color: "var(--forest)", letterSpacing: -0.5,
          }}>BenchLab</span>
        </button>
        <div style={{ display: "flex", gap: 4 }}>
          {[
            { id: "home", label: "Home", icon: <IconCompass size={16} /> },
            { id: "logbook", label: "Logbook", icon: <IconBook size={16} /> },
            { id: "search", label: "Find Talent", icon: <IconSearch size={16} /> },
            { id: "post", label: "Post a Role", icon: <IconBriefcase size={16} /> },
            { id: "consultant", label: "Consultants", icon: <IconHammer size={16} /> },
          ].map(item => (
            <button key={item.id} onClick={() => setPage(item.id)} style={{
              background: page === item.id ? "var(--forest)" : "transparent",
              color: page === item.id ? "var(--cream)" : "var(--bark)",
              border: "none", borderRadius: 8, padding: "8px 14px",
              fontSize: 13, fontWeight: 500, cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6,
              transition: "all 0.25s ease",
              fontFamily: "'Source Sans 3', sans-serif",
            }}>
              {item.icon}{item.label}
            </button>
          ))}
        </div>
      </div>
    </nav>
  );
}

// ─── HOME PAGE ───
function HomePage({ setPage }) {
  return (
    <div>
      {/* Hero */}
      <section style={{
        position: "relative", overflow: "hidden",
        background: "linear-gradient(160deg, var(--forest) 0%, #1E2E20 60%, var(--bark) 100%)",
        padding: "100px 24px 80px", textAlign: "center",
      }}>
        {/* Decorative circles */}
        <div style={{ position: "absolute", top: -120, right: -80, width: 400, height: 400, borderRadius: "50%", border: "1px solid rgba(201,168,76,0.12)" }} />
        <div style={{ position: "absolute", bottom: -60, left: -40, width: 250, height: 250, borderRadius: "50%", border: "1px solid rgba(201,168,76,0.08)" }} />

        <div className="animate-up" style={{ maxWidth: 720, margin: "0 auto", position: "relative", zIndex: 1 }}>
          <div style={{
            display: "inline-block", padding: "6px 18px", borderRadius: 24,
            border: "1px solid rgba(201,168,76,0.3)", marginBottom: 28,
            fontSize: 13, color: "var(--gold-soft)", letterSpacing: 1.5,
            fontWeight: 500, textTransform: "uppercase",
          }}>
            For the craft &amp; formulation industries
          </div>
          <h1 style={{
            fontFamily: "'Playfair Display', serif", fontSize: 56,
            color: "var(--cream)", fontWeight: 700, lineHeight: 1.15,
            marginBottom: 20, letterSpacing: -1,
          }}>
            What you can do<br />
            <span style={{ color: "var(--gold)" }}>matters more</span><br />
            than what you say.
          </h1>
          <p className="animate-up stagger-2" style={{
            fontSize: 18, color: "var(--sage-light)", lineHeight: 1.7,
            maxWidth: 540, margin: "0 auto 40px", fontWeight: 300,
          }}>
            BenchLab connects verified craftspeople, formulators, and production specialists
            with employers who value proven expertise over polished CVs.
          </p>
          <div className="animate-up stagger-3" style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={() => setPage("logbook")} style={{
              background: "var(--gold)", color: "var(--forest)", border: "none",
              padding: "14px 32px", borderRadius: 8, fontSize: 15, fontWeight: 600,
              cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif",
              transition: "transform 0.2s ease",
            }} onMouseEnter={e => e.target.style.transform = "translateY(-2px)"}
               onMouseLeave={e => e.target.style.transform = "translateY(0)"}>
              Build Your Logbook
            </button>
            <button onClick={() => setPage("search")} style={{
              background: "transparent", color: "var(--cream)",
              border: "1px solid rgba(250,246,238,0.25)",
              padding: "14px 32px", borderRadius: 8, fontSize: 15, fontWeight: 500,
              cursor: "pointer", fontFamily: "'Source Sans 3', sans-serif",
              transition: "all 0.2s ease",
            }} onMouseEnter={e => { e.target.style.borderColor = "var(--gold)"; e.target.style.color = "var(--gold)"; }}
               onMouseLeave={e => { e.target.style.borderColor = "rgba(250,246,238,0.25)"; e.target.style.color = "var(--cream)"; }}>
              Find Talent
            </button>
          </div>
        </div>
      </section>

      {/* How it works */}
      <section style={{ maxWidth: 1000, margin: "0 auto", padding: "80px 24px" }}>
        <h2 className="animate-up" style={{
          fontFamily: "'Playfair Display', serif", fontSize: 32, color: "var(--forest)",
          textAlign: "center", marginBottom: 12,
        }}>Not a CV. A Craftsperson's Logbook.</h2>
        <p className="animate-up stagger-1" style={{
          textAlign: "center", color: "var(--bark-light)", fontSize: 16,
          maxWidth: 560, margin: "0 auto 56px", lineHeight: 1.6,
        }}>
          Your BenchLab profile captures what generic platforms miss — the processes you've mastered,
          the materials you know, and the standards you work to.
        </p>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 24 }}>
          {[
            {
              icon: <IconBook size={28} />, title: "Build Your Logbook",
              desc: "Select from industry-specific processes, materials, equipment, and standards. No keyword guessing — a taxonomy built by people who've worked the bench.",
              color: "var(--forest)",
            },
            {
              icon: <IconCheck size={28} />, title: "Get Verified",
              desc: "Peers and former employers confirm your skills. Verification that means something — not a stranger clicking 'endorse' on a skill they've never seen you use.",
              color: "var(--gold)",
            },
            {
              icon: <IconSearch size={28} />, title: "Get Found",
              desc: "Employers search by capability, not keywords. When a manufacturer needs someone who can run a six-head filler and understands GMP, they find you.",
              color: "var(--amber)",
            },
          ].map((item, i) => (
            <div key={i} className={`animate-up stagger-${i + 2}`} style={{
              background: "var(--warm-white)", borderRadius: 16, padding: 36,
              border: "1px solid rgba(44,62,45,0.06)",
              boxShadow: "0 2px 20px var(--shadow)",
              transition: "transform 0.3s ease, box-shadow 0.3s ease",
              cursor: "default",
            }} onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 8px 32px rgba(44,62,45,0.12)"; }}
               onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "0 2px 20px var(--shadow)"; }}>
              <div style={{ color: item.color, marginBottom: 16 }}>{item.icon}</div>
              <h3 style={{
                fontFamily: "'Playfair Display', serif", fontSize: 20,
                color: "var(--forest)", marginBottom: 12,
              }}>{item.title}</h3>
              <p style={{ color: "var(--bark-light)", fontSize: 14, lineHeight: 1.7 }}>{item.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* Industries */}
      <section style={{ background: "var(--forest)", padding: "72px 24px" }}>
        <div style={{ maxWidth: 1000, margin: "0 auto" }}>
          <h2 style={{
            fontFamily: "'Playfair Display', serif", fontSize: 28, color: "var(--cream)",
            textAlign: "center", marginBottom: 48,
          }}>Built for your industry</h2>
          <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 16 }}>
            {["Home Fragrance", "Fine & Functional Fragrance", "Skincare", "Personal Care & Toiletries", "Regulatory & Compliance"].map((ind, i) => (
              <div key={i} style={{
                padding: "14px 28px", borderRadius: 40,
                border: "1px solid rgba(201,168,76,0.25)",
                color: "var(--gold-soft)", fontSize: 14, fontWeight: 500,
                letterSpacing: 0.5, transition: "all 0.3s ease", cursor: "default",
              }} onMouseEnter={e => { e.target.style.background = "rgba(201,168,76,0.12)"; e.target.style.borderColor = "var(--gold)"; }}
                 onMouseLeave={e => { e.target.style.background = "transparent"; e.target.style.borderColor = "rgba(201,168,76,0.25)"; }}>
                {ind}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Stats */}
      <section style={{ padding: "64px 24px", background: "var(--cream-dark)" }}>
        <div style={{ maxWidth: 800, margin: "0 auto", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 32, textAlign: "center" }}>
          {[
            { num: "142", label: "Verified Practitioners" },
            { num: "38", label: "Registered Employers" },
            { num: "24", label: "Active Consultants" },
          ].map((s, i) => (
            <div key={i}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 44, color: "var(--forest)", fontWeight: 700 }}>{s.num}</div>
              <div style={{ color: "var(--bark-light)", fontSize: 14, marginTop: 4, letterSpacing: 0.5 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}

// ─── LOGBOOK PROFILE PAGE ───

        { name: "Fragrance Compounding", level: "peer", years: 6 },
        { name: "Reed Diffuser Assembly", level: "employer", years: 5 },
        { name: "Filling Line Operation", level: "peer", years: 7 },
        { name: "Wax Melt Production", level: "self", years: 4 },
      ],
      materials: [

            padding: "16px 24px",

            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{

    </div>
  );
}

              padding: "12px 24px", borderRadius: 8, border: "1px solid rgba(44,62,45,0.15)",
